<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lantern — Market Intelligence Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f7ff;--white:#ffffff;--border:#d0e8f8;--border-dark:#a8d0ef;
  --text:#0a1628;--text-mid:#2d4a6e;--text-muted:#5b7fa6;--text-faint:#9ab8d4;
  --lantern:#00AEEF;--lantern-dark:#0090cc;--lantern-light:#e6f7fd;--lantern-mid:#a0ddf5;
  --tier1:#0f7a3e;--tier1-light:#e6f5ed;--tier1-mid:#7dcba4;
  --tier2:#c45c00;--tier2-light:#fff3e6;--tier2-mid:#f5bc80;
  --tier3:#2d4a6e;--tier3-light:#e6edf5;--tier3-mid:#9ab8d4;
  --peer-yes:#0f7a3e;--peer-yes-bg:#e6f5ed;
  --peer-no:#c0392b;--peer-no-bg:#fdf0ee;
  --peer-unknown:#5b7fa6;--peer-unknown-bg:#edf3f9;
  --seg-hvac:#0f5ca8;--seg-hvac-bg:#e6f0fb;
  --seg-plumbing:#7a0f7a;--seg-plumbing-bg:#f5e6f5;
  --seg-electrical:#b07800;--seg-electrical-bg:#fdf5e0;
  --seg-industrial:#0f7a3e;--seg-industrial-bg:#e6f5ed;
  --signal-active:#0f5ca8;--signal-active-bg:#e6f0fb;--signal-active-mid:#90bce8;
  --signal-hiring:#0f7a3e;--signal-hiring-bg:#e6f5ed;--signal-hiring-mid:#7dcba4;
  --signal-none:#5b7fa6;--signal-none-bg:#edf3f9;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}

/* HEADER */
.header{background:var(--text);color:var(--white);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;}
.header-left{display:flex;align-items:center;gap:20px;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-img{height:28px;width:auto;filter:brightness(0) invert(1);}
.header-divider-v{width:1px;height:36px;background:rgba(255,255,255,.15);}
.header-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px;}
.header-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:.01em;}
.header-stats{display:flex;gap:36px;}
.header-stat{display:flex;flex-direction:column;gap:2px;}
.header-stat-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:500;color:var(--lantern);line-height:1;transition:all .3s;}
.header-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.1em;text-transform:uppercase;}
.refresh-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;background:rgba(0,174,239,.12);border:1px solid rgba(0,174,239,.3);border-radius:4px;color:var(--lantern);font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .15s;}
.refresh-btn:hover{background:rgba(0,174,239,.2);}
.refresh-btn.spinning svg{animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LAYOUT */
.page{max-width:1400px;margin:0 auto;padding:36px 40px 80px;}
.nav{display:flex;gap:0;border-bottom:2px solid var(--text);margin-bottom:36px;}
.nav-tab{padding:10px 22px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--text-muted);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--text);border-bottom-color:var(--lantern);font-weight:700;}

/* LABELS */
.section-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* FILTERS */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.filter-btn{padding:5px 13px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border-dark);background:transparent;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--lantern);color:var(--lantern-dark);}
.filter-btn.active{background:var(--lantern);color:var(--white);border-color:var(--lantern);}

/* ACCOUNT CARDS */
.account-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.account-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:box-shadow .15s,transform .15s;position:relative;overflow:hidden;}
.account-card:hover{box-shadow:0 6px 28px rgba(0,174,239,.15);transform:translateY(-2px);}
.account-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.account-card.tier1::before{background:var(--tier1);}
.account-card.tier2::before{background:var(--tier2);}
.account-card.tier3::before{background:var(--lantern);}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-name{font-size:17px;font-weight:700;color:var(--text);line-height:1.2;}
.card-segment{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-top:3px;}
.icp-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;flex-shrink:0;}
.icp-badge.tier1{background:var(--tier1-light);color:var(--tier1);border:1px solid var(--tier1-mid);}
.icp-badge.tier2{background:var(--tier2-light);color:var(--tier2);border:1px solid var(--tier2-mid);}
.icp-badge.tier3{background:var(--lantern-light);color:var(--lantern-dark);border:1px solid var(--lantern-mid);}
.score-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.score-num{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:500;color:var(--text);line-height:1;}
.score-denom{font-size:11px;color:var(--text-muted);}
.score-track{flex:1;height:5px;background:var(--bg);border-radius:3px;border:1px solid var(--border);overflow:hidden;}
.score-fill{height:100%;border-radius:3px;transition:width .4s;}
.score-fill.tier1{background:var(--tier1);}
.score-fill.tier2{background:var(--tier2);}
.score-fill.tier3{background:var(--lantern);}
.card-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.pill{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--text-mid);white-space:nowrap;}
.pill.peer-yes{background:var(--peer-yes-bg);color:var(--peer-yes);border-color:var(--tier1-mid);}
.pill.peer-unknown{background:var(--peer-unknown-bg);color:var(--peer-unknown);}
.pill.peer-no{background:var(--peer-no-bg);color:var(--peer-no);}

/* SIGNAL TAGS */
.signal-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;}
.signal-tag.active-hiring{background:var(--signal-hiring-bg);color:var(--signal-hiring);border:1px solid var(--signal-hiring-mid);}
.signal-tag.active-expansion{background:var(--signal-active-bg);color:var(--signal-active);border:1px solid var(--signal-active-mid);}
.signal-tag.pe-acquired{background:#fdf5e0;color:#b07800;border:1px solid #f0c88a;}
.signal-tag.no-signal{background:var(--signal-none-bg);color:var(--signal-none);border:1px solid var(--border-dark);}

/* PERSONA BARS */
.persona-bars{display:flex;flex-direction:column;gap:4px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;}
.pb-row{display:flex;align-items:center;gap:8px;}
.pb-label{font-size:9px;color:var(--text-muted);width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pb-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;background:var(--lantern);opacity:.5;}
.pb-pct{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted);width:28px;text-align:right;flex-shrink:0;}
.card-meta{display:flex;gap:16px;padding-top:10px;border-top:1px solid var(--border);margin-top:4px;}
.card-meta-item{display:flex;flex-direction:column;gap:2px;}
.card-meta-val{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:var(--text);}
.card-meta-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;}

/* SEGMENT TAGS */
.seg-tag{display:inline-flex;padding:3px 8px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;}
.seg-tag.HVAC{background:var(--seg-hvac-bg);color:var(--seg-hvac);}
.seg-tag.Plumbing{background:var(--seg-plumbing-bg);color:var(--seg-plumbing);}
.seg-tag.Electrical{background:var(--seg-electrical-bg);color:var(--seg-electrical);}
.seg-tag.Industrial{background:var(--seg-industrial-bg);color:var(--seg-industrial);}

/* BACK BUTTON */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);cursor:pointer;margin-bottom:28px;border:none;background:none;padding:0;transition:color .15s;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;}
.back-btn:hover{color:var(--lantern);}
.back-btn::before{content:'←';}

/* DIVE VIEW */
.dive-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:20px;}
.dive-title{font-size:32px;font-weight:800;color:var(--text);line-height:1.1;}
.dive-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:6px;}
.dive-stats{display:flex;gap:24px;flex-wrap:wrap;}
.dive-stat{display:flex;flex-direction:column;gap:2px;text-align:right;}
.dive-stat-val{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;color:var(--lantern);line-height:1;}
.dive-stat-lbl{font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;}
.dive-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
@media(max-width:900px){.dive-grid{grid-template-columns:1fr;}}
.dive-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px 22px;}
.dive-card-title{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--text-mid);margin-bottom:12px;}
.info-row{display:flex;gap:8px;align-items:baseline;margin-bottom:7px;}
.info-label{font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);width:120px;flex-shrink:0;}
.info-value{font-size:12px;color:var(--text-mid);line-height:1.5;}

/* PEER BLOCK */
.peer-block{border-radius:6px;padding:14px 16px;margin-bottom:4px;}
.peer-block.yes{background:var(--peer-yes-bg);border:1px solid var(--tier1-mid);}
.peer-block.unknown{background:var(--peer-unknown-bg);border:1px solid var(--border);}
.peer-block.no{background:var(--peer-no-bg);border:1px solid #f0b8b0;}
.peer-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:4px;}
.peer-block.yes .peer-label{color:var(--tier1);}
.peer-block.unknown .peer-label{color:var(--peer-unknown);}
.peer-block.no .peer-label{color:#c0392b;}
.peer-headline{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;}

/* SIGNAL BLOCK */
.signal-block{border-radius:6px;padding:16px 18px;}
.signal-block.active-hiring{background:var(--signal-hiring-bg);border:1px solid var(--signal-hiring-mid);}
.signal-block.active-expansion{background:var(--signal-active-bg);border:1px solid var(--signal-active-mid);}
.signal-block.pe-acquired{background:#fdf5e0;border:1px solid #f0c88a;}
.signal-block.no-signal{background:var(--signal-none-bg);border:1px solid var(--border);}
.signal-type-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;margin-bottom:6px;}
.signal-block.active-hiring .signal-type-label{color:var(--signal-hiring);}
.signal-block.active-expansion .signal-type-label{color:var(--signal-active);}
.signal-block.no-signal .signal-type-label{color:var(--signal-none);}
.signal-headline{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.3;}
.signal-detail{font-size:11px;color:var(--text-mid);line-height:1.7;}

/* TECH PILLS */
.tech-pills{display:flex;flex-wrap:wrap;gap:5px;}
.tech-pill{padding:3px 9px;border-radius:3px;font-size:10px;background:var(--bg);border:1px solid var(--border-dark);color:var(--text-mid);}
.tech-pill.profit21{background:#e6f0fb;color:#0f5ca8;border-color:#90bce8;}
.tech-pill.eclipse{background:#fff3e6;color:#c45c00;border-color:#f5bc80;}
.tech-pill.sap{background:#f5e6f5;color:#7a0f7a;border-color:#d4a0d4;}

/* FUNCTION BARS */
.fn-bars{display:flex;flex-direction:column;gap:6px;}
.fn-row{display:flex;align-items:center;gap:8px;}
.fn-label{font-size:11px;color:var(--text-mid);width:200px;flex-shrink:0;}
.fn-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.fn-fill{height:100%;border-radius:3px;background:var(--lantern);opacity:.5;}
.fn-pct{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted);width:36px;text-align:right;flex-shrink:0;}

/* CONTACTS */
.contact-block{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.contact-row{display:grid;grid-template-columns:28px 1fr 1.2fr 1fr 0.8fr auto;gap:0;align-items:center;padding:12px 14px;background:var(--white);cursor:pointer;transition:background .12s;}
.contact-row:hover{background:var(--lantern-light);}
.contact-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-faint);}
.contact-name-cell{font-weight:600;color:var(--text);font-size:12px;display:flex;align-items:center;gap:5px;}
.contact-title-cell{font-size:11px;color:var(--text-mid);line-height:1.4;padding:0 12px;}
.contact-email-cell{font-size:10px;}
.contact-email-cell a{color:var(--lantern-dark);text-decoration:none;}
.contact-email-cell a:hover{text-decoration:underline;}
.contact-loc-cell{font-size:10px;color:var(--text-muted);padding:0 12px;}
.contact-link{color:var(--lantern);text-decoration:none;font-size:10px;opacity:.6;transition:opacity .15s;}
.contact-link:hover{opacity:1;}
.toggle-msg-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border:1px solid var(--border-dark);background:var(--white);padding:4px 10px;border-radius:3px;transition:all .12s;white-space:nowrap;}
.toggle-msg-btn:hover{color:var(--lantern-dark);border-color:var(--lantern-mid);}
.messaging-panel{background:var(--lantern-light);border-top:1px solid var(--border);padding:16px 16px 16px 42px;display:none;}
.messaging-panel.open{display:block;}
.msg-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.msg-persona-label{font-size:11px;font-weight:600;color:var(--text);}
.msg-subject-line{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--white);border:1px solid var(--border);border-radius:3px;font-size:10px;color:var(--text-mid);font-family:'IBM Plex Mono',monospace;margin-left:auto;}
.msg-subject-lbl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-right:2px;}
.msg-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.msg-col-label{font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;}
.msg-hook{font-size:11px;color:var(--text);line-height:1.75;font-style:italic;}
.msg-angle{font-size:11px;color:var(--text-mid);line-height:1.75;}
.msg-avoid{font-size:11px;color:#c0392b;line-height:1.75;}

/* GMAIL BUTTON */
.gmail-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:3px;font-size:9px;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase;font-weight:600;background:var(--lantern-light);color:var(--lantern-dark);border:1px solid var(--lantern-mid);text-decoration:none;white-space:nowrap;transition:all .12s;}
.gmail-btn:hover{background:var(--lantern);color:white;}

/* LOADING / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;gap:14px;}
.loading-spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--lantern);border-radius:50%;animation:spin .7s linear infinite;}
.loading-text{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);}
.error-block{background:#fdf0ee;border:1px solid #f0b8b0;border-radius:8px;padding:16px 20px;font-size:12px;color:#c0392b;}

/* SCORECARD TABLE */
.score-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.score-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);padding:10px 14px;text-align:left;border-bottom:1px solid var(--border-dark);background:var(--bg);cursor:pointer;user-select:none;white-space:nowrap;}
.score-table th:hover{color:var(--lantern);}
.score-table th.sorted{color:var(--lantern);}
.score-table td{font-size:11px;padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text-mid);}
.score-table tr:last-child td{border-bottom:none;}
.score-table tr:hover td{background:var(--lantern-light);cursor:pointer;}
@media(max-width:768px){.page{padding:24px 16px 60px;}.header{padding:16px;}.dive-grid{grid-template-columns:1fr;}.msg-grid{grid-template-columns:1fr;}.contact-row{grid-template-columns:1fr;}}

/* PRIMARY BADGE */
.primary-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:3px;background:rgba(0,174,239,.1);border:1px solid rgba(0,174,239,.25);font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--lantern);}

/* CIRCULAR SCORE RING */
.score-ring-wrap{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.score-ring{position:relative;width:64px;height:64px;flex-shrink:0;}
.score-ring svg{transform:rotate(-90deg);}
.score-ring-bg{fill:none;stroke:var(--border);stroke-width:5;}
.score-ring-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
.score-ring-fill.tier1{stroke:var(--tier1);}
.score-ring-fill.tier2{stroke:var(--tier2);}
.score-ring-fill.tier3{stroke:var(--lantern);}
.score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;}
.score-ring-num{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;color:var(--text);}
.score-ring-denom{font-size:8px;color:var(--text-muted);margin-top:1px;}
.score-ring-label{display:flex;flex-direction:column;gap:3px;}
.score-ring-tier{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.score-ring-tier.tier1{color:var(--tier1);}
.score-ring-tier.tier2{color:var(--tier2);}
.score-ring-tier.tier3{color:var(--lantern-dark);}
.score-ring-sub{font-size:10px;color:var(--text-muted);}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-wrap">
      <img src="https://www.lanternhq.com/Logo.svg" alt="Lantern" class="logo-img">
    </div>
    <div class="header-divider-v"></div>
    <div>
      <div class="header-title">Account Intelligence Dashboard</div>
    </div>
    <div class="header-divider-v"></div>
    <div class="header-stats">
      <div class="header-stat">
        <div style="display:flex;align-items:center;gap:6px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--lantern)" stroke-width="2" opacity=".7"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <div class="header-stat-val" id="stat-accounts">—</div>
        </div>
        <div class="header-stat-lbl">Target Accounts</div>
      </div>

function segClass(s){if(!s)return'';if(s.includes('HVAC'))return'HVAC';if(s.includes('Plumbing'))return'Plumbing';if(s.includes('Electrical'))return'Electrical';if(s.includes('Industrial'))return'Industrial';return'';}
function peerClass(v){if(v==='Strong'||v==='Yes')return'peer-yes';if(v==='No')return'peer-no';return'peer-unknown';}
function techPillClass(t){const l=t.toLowerCase();if(l.includes('profit 21')||l.includes('p21'))return'profit21';if(l.includes('eclipse'))return'eclipse';if(l.includes('sap'))return'sap';return'';}
function scoreColor(s){const n=parseFloat(s);if(n>=8)return'tier1';if(n>=6)return'tier2';return'tier3';}
function contactsForAccount(name){return CONTACTS.filter(c=>c.company_name&&c.company_name.trim().toLowerCase()===name.trim().toLowerCase());}
function inferPersona(title){if(!title)return'Other';const t=title.toLowerCase();if(t.includes('ceo')||t.includes('president')||t.includes('owner')||t.includes('founder'))return'CEO / Owner';if(t.includes('purchasing')||t.includes('buyer')||t.includes('procurement'))return'Purchasing / Buying';if(t.includes('supply chain')||t.includes('inventory')||t.includes('operations'))return'Supply Chain / Operations';if(t.includes('cfo')||t.includes('finance')||t.includes('controller'))return'CFO / Finance';if(t.includes('coo'))return'COO';return'Other';}
function getSignalType(acc){if(acc.signal_type)return acc.signal_type;if(acc.active_job_posting==='Yes')return'active-hiring';return'no-signal';}
function getSignalLabel(type){if(type==='active-hiring')return'Active Hiring Signal';if(type==='active-expansion')return'Expansion Signal';if(type==='pe-acquired')return'PE Acquisition Signal';return'No Signal';}
function buildPersonaBreakdown(contacts){const counts={};contacts.forEach(c=>{const p=inferPersona(c.contact_title);counts[p]=(counts[p]||0)+1;});return Object.entries(counts).sort((a,b)=>b[1]-a[1]);}
function getContactMessaging(contact,acc){
  if(contact.outreach_hook)return{hook:contact.outreach_hook,angle:contact.message_angle||'',avoid:contact.avoid||'',subject:contact.subject_line||''};
  const signalType=getSignalType(acc);
  let hook='',angle='',avoid='',subject='';
  const persona=inferPersona(contact.contact_title);
  if(persona==='CEO / Owner'){
    hook=`Running a ${acc.revenue||'multi-million dollar'} distribution operation means your buying team is making thousands of daily stocking decisions manually. The cost shows up as both stockouts and dead inventory — usually in the millions. How is ${acc.company_name} managing that today?`;
    angle='CEO owns P&L pain. Lead with the dual cost of stockouts and dead inventory. They feel both sides of the impossible choice.';
    avoid="Don't lead with technology. Lead with the financial cost of manual purchasing.";
    subject=`Purchasing intelligence for ${acc.company_name}`;
  } else if(persona==='Purchasing / Buying'){
    hook=`Your buying team at ${acc.company_name} is making individual stocking decisions across thousands of SKUs every day. The accuracy of those calls — lead times, demand shifts, safety stock — determines whether you're holding the right inventory or explaining stockouts to sales.`;
    angle='Purchasing persona — lead with their daily operational pain. They know the problem viscerally.';
    avoid="Don't talk about AI. Talk about better purchasing decisions and less manual work.";
    subject=`Smarter stocking decisions for ${acc.company_name}'s buying team`;
  } else {
    hook=`The gap between what ${acc.company_name} is stocking and what your customers actually need is costing you in two directions — missed sales and working capital tied up in dead inventory. Most distributors at your scale are still solving that with spreadsheets.`;
    angle='Lead with the dual cost of the impossible choice. Frame Lantern as the only way to solve both sides simultaneously.';
    avoid="Don't assume they know how bad the problem is. Quantify it.";
    subject=`Inventory intelligence for ${acc.company_name}`;
  }
  return{hook,angle,avoid,subject};
}

async function loadData(){
  const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');
  try{
    const headers={'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`};
    const [accRes,conRes]=await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/accounts?select=*`,{headers}),
      fetch(`${SUPABASE_URL}/rest/v1/contacts?select=*`,{headers})
    ]);
    const accounts=await accRes.json();
    const contacts=await conRes.json();
    const validAccounts=(Array.isArray(accounts)?accounts:[]).filter(a=>a.company_name&&a.company_name.trim());
    const validContacts=(Array.isArray(contacts)?contacts:[]).filter(c=>c.contact_name&&c.contact_name.trim());
    if(validAccounts.length>0){ACCOUNTS=validAccounts;CONTACTS=validContacts;}
    else{ACCOUNTS=FALLBACK_ACCOUNTS;CONTACTS=FALLBACK_CONTACTS;}
  }catch(e){ACCOUNTS=FALLBACK_ACCOUNTS;CONTACTS=FALLBACK_CONTACTS;}
  updateStats();renderCurrentView();
  btn.classList.remove('spinning');
}

function animateCount(el, target, duration=800){
  const start=parseInt(el.textContent)||0;
  const range=target-start;
  const startTime=performance.now();
  function update(now){
    const elapsed=now-startTime;
    const progress=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-progress,3);
    el.textContent=Math.round(start+range*ease);
    if(progress<1)requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}
function updateStats(){
  animateCount(document.getElementById('stat-accounts'),ACCOUNTS.length);
  animateCount(document.getElementById('stat-contacts'),CONTACTS.length);
  animateCount(document.getElementById('stat-tier1'),ACCOUNTS.filter(a=>a.icp_tier==='Tier 1').length);
  animateCount(document.getElementById('stat-signal'),ACCOUNTS.filter(a=>getSignalType(a)!=='no-signal').length);
}

      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${acc.revenue||'—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${acc.num_locations||'—'}</td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:10px">${acc.erp_system||'—'} ${acc.erp_match==='Yes'?'<span style="color:var(--tier1)">✓</span>':''}</td>
      <td><span class="signal-tag ${signalType}" style="font-size:8px">${getSignalLabel(signalType)}</span></td>
      <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center">${contacts.length}</td>
      <td><span style="display:inline-flex;padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;letter-spacing:.04em;background:var(--bg);border:1px solid var(--border-dark);color:var(--text-muted)">${acc.sequence_status||'Not Started'}</span></td>
    </tr>`;
  });
  html+=`</tbody></table>`;el.innerHTML=html;
}
window.setScorecardSort=function(key){if(scorecardSort.key===key)scorecardSort.dir*=-1;else scorecardSort={key,dir:-1};renderScorecard();};
function openDiveFromScorecard(name){document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.nav-tab')[0].classList.add('active');document.getElementById('view-scorecard').style.display='none';document.getElementById('view-accounts').style.display='block';openDive(name);}

document.getElementById('view-accounts').innerHTML='<div class="loading"><div class="loading-spinner"></div><div class="loading-text">Loading accounts...</div></div>';
loadData();
</script>
</body>
</html>
